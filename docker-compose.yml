x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "5m"
    max-file: "3"

services:
  tor:
    image: tor:${TOR_VERSION}
    build:
      context: ./tor
      args:
        TOR_VERSION: ${TOR_VERSION}
        TOR_USER_ID: ${TOR_USER_ID}
        GROUP_ID: ${SHARED_GID}
    volumes:
      - ${TOR_DATA}:/home/tor
    logging: *default-logging
    restart: on-failure
    stop_grace_period: 1m
    healthcheck:
      test: ["CMD", "nc", "-z", "tor", "9050"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
  i2p:
    image: i2p:${I2P_VERSION}
    profiles:
      - disabled
    build:
      context: ./i2p
      args:
        I2P_VERSION: ${I2P_VERSION}
        I2P_USER_ID: ${I2P_USER_ID}
        GROUP_ID: ${SHARED_GID}
    ports:
      - "7657:7657"
    volumes:
      - ${I2P_DATA}:/i2p/.i2p
    logging: *default-logging
    restart: on-failure
    stop_grace_period: 1m
  bitcoin:
    image: bitcoin:$BITCOIN_VERSION
    depends_on:
      tor:
        condition: service_healthy
      # - i2p
    build:
      context: ./bitcoin
      args:
        BITCOIN_VERSION: ${BITCOIN_VERSION}
        BITCOIN_USER_ID: ${BITCOIN_USER_ID}
        GROUP_ID: ${SHARED_GID}
    volumes:
      - ${BITCOIN_DATA}:/home/bitcoin/.bitcoin
    logging: *default-logging
    restart: unless-stopped
    stop_grace_period: 5m
  electrs:
    image: electrs:${ELECTRS_VERSION}
    depends_on:
      - bitcoin
    build:
      context: ./electrs
      args:
        ELECTRS_VERSION: ${ELECTRS_VERSION}
        ELECTRS_USER_ID: ${ELECTRS_USER_ID}
        GROUP_ID: ${SHARED_GID}
    volumes:
      - ${BITCOIN_DATA}:/home/electrs/.bitcoin
      - ${ELECTRS_DATA}:/home/electrs/.electrs
    logging: *default-logging
    restart: on-failure
    stop_grace_period: 2m
  btcrpcexplorer:
    image: btcrpcexplorer:${BTC_RPC_EXPLORER_VERSION}
    depends_on:
      - bitcoin
      - electrs
    build:
      context: ./btcrpcexplorer
      args:
        BTC_RPC_EXPLORER_VERSION: ${BTC_RPC_EXPLORER_VERSION}
        BTC_RPC_EXPLORER_COMMIT: ${BTC_RPC_EXPLORER_COMMIT}
        BTC_RPC_EXPLORER_USER_ID: ${BTC_RPC_EXPLORER_USER_ID}
        GROUP_ID: ${SHARED_GID}
    volumes:
      - ${BTC_RPC_EXPLORER_DATA}:/home/btcrpcexplorer/.config
    logging: *default-logging
    restart: on-failure
  nginx:
    image: nginx:alpine-slim
    depends_on:
      - btcrpcexplorer
      - electrs
    ports:
      - "${BTC_RPC_EXPLORER_HTTPS_PORT}:3003"
      - "${ELECTRS_SSL_PORT}:50002"
    volumes:
      - ${NGINX_DATA}:/etc/nginx
    logging: *default-logging
    restart: on-failure
