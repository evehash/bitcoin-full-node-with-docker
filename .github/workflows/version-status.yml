name: Version status

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * 1"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  generate-version-status:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate Shields endpoint JSON files
        shell: bash
        run: |
          set -euo pipefail

          ENV_FILE=".env.example"
          OUTPUT_DIR="public/version-status"

          mkdir -p "$OUTPUT_DIR"

          get_env_value() {
            local key="$1"

            grep -E "^${key}=" "$ENV_FILE" \
              | head -n1 \
              | cut -d "=" -f2-
          }

          latest_tag_version() {
            local repo="$1"
            local prefix="$2"

            git ls-remote --tags --refs "$repo" \
              | sed -E "s|.*refs/tags/${prefix}([0-9]+(\.[0-9]+)+)$|\1|p;d" \
              | sort -V \
              | tail -n1
          }

          version_ge() {
            local current="$1"
            local latest="$2"

            [[ "$(printf '%s\n%s\n' "$latest" "$current" | sort -V | head -n1)" == "$latest" ]]
          }

          write_badge() {
            local id="$1"
            local message="$2"
            local color="$3"

            cat > "$OUTPUT_DIR/${id}.json" <<EOF
          {
            "schemaVersion": 1,
            "label": "${id}",
            "message": "${message}",
            "color": "${color}"
          }
          EOF
          }

          check_service() {
            local id="$1"
            local env_key="$2"
            local repo="$3"
            local prefix="$4"

            local current
            local latest

            current="$(get_env_value "$env_key" || true)"

            if [[ -z "$current" ]]; then
              echo "warning: ${env_key} not found in ${ENV_FILE}"
              write_badge "$id" "unknown" "lightgrey"
              return
            fi

            latest="$(latest_tag_version "$repo" "$prefix" || true)"

            if [[ -z "$latest" ]]; then
              echo "warning: no stable semver tags found for ${id}"
              write_badge "$id" "unknown" "lightgrey"
              return
            fi

            if version_ge "$current" "$latest"; then
              write_badge "$id" "current" "brightgreen"
            else
              write_badge "$id" "new release" "blue"
            fi
          }

          check_service "tor" "TOR_VERSION" "https://gitlab.torproject.org/tpo/core/tor.git" "tor-"
          check_service "bitcoin" "BITCOIN_VERSION" "https://github.com/bitcoin/bitcoin.git" "v"
          check_service "electrs" "ELECTRS_VERSION" "https://github.com/romanz/electrs.git" "v"
          check_service "btcrpcexplorer" "BTC_RPC_EXPLORER_VERSION" "https://github.com/janoside/btc-rpc-explorer.git" "v"
          check_service "i2p" "I2P_VERSION" "https://github.com/i2p/i2p.i2p.git" "i2p-"

          write_badge "nginx" "rolling tag" "lightgrey"

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy-version-status:
    runs-on: ubuntu-latest
    needs: generate-version-status

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
